{% extends 'base.html' %}

{% block title %}Add Address - MasterShop{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">Add New Address</h1>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded">Save Address</button>
    </form>
</div>
{% endblock %}
